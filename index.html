<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICTORIA 17</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;700&display=swap');

        * { cursor: none; box-sizing: border-box; }

        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Custom Cursor */
        #cursor-follower {
            position: fixed; width: 40px; height: 40px;
            border: 1px solid #ff0055; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transition: transform 0.1s ease, background 0.3s ease;
            mix-blend-mode: difference;
        }

        /* Background Text */
        .bg-text {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 25vw; font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap; z-index: 0;
            pointer-events: none;
        }

        /* Main Section */
        .section {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; z-index: 10;
        }

        .name-container { position: relative; }

        .main-name {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.8; margin: 0;
            background: linear-gradient(90deg, #fff, #ff0055, #7000ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 5s linear infinite;
        }

        @keyframes flow {
            0% { background-position: 0%; }
            100% { background-position: 200%; }
        }

        /* Photo Grid - Editorial Style */
        .editorial-grid {
            padding: 100px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; z-index: 10; position: relative;
        }

        .photo-wrap {
            position: relative; height: 500px;
            overflow: hidden; filter: grayscale(100%);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .photo-wrap:hover {
            filter: grayscale(0%);
            transform: scale(0.98);
            border-color: #ff0055;
        }

        .photo-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.8s;
        }

        .photo-wrap:hover img { transform: scale(1.1); }

        .photo-label {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 0.8rem; letter-spacing: 3px;
            text-transform: uppercase; color: #ff0055;
            background: #000; padding: 5px 10px;
        }

        /* Wish Message Overlay */
        .overlay-msg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ff0055; color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; clip-path: circle(0% at 50% 50%);
            padding: 50px; text-align: center;
        }

        .overlay-msg h2 {
            font-family: 'Syncopate'; font-size: 4rem;
        }

        .cta-trigger {
            margin-top: 40px; padding: 20px 60px;
            border: 1px solid #fff; background: none;
            color: #fff; font-family: 'Syncopate';
            letter-spacing: 5px; transition: 0.4s;
        }

        .cta-trigger:hover {
            background: #fff; color: #000;
        }

    </style>
</head>
<body>

<div id="cursor-follower"></div>
<div class="bg-text">17171717</div>

<section class="section">
    <div class="name-container">
        <p style="letter-spacing: 15px; margin-bottom: 10px; opacity: 0.5;">LIMITLESS ENERGY</p>
        <h1 class="main-name">VICTORIA</h1>
    </div>
    <button class="cta-trigger" onclick="openMessage()">UNLOCK MAGIC</button>
</section>

<div class="editorial-grid">
    <div class="photo-wrap">
        <img src="img\4.jpg">
        <div class="photo-label">VIBE_01</div>
    </div>
    <div class="photo-wrap" style="margin-top: 50px;">
        <img src="img\2.jpg">
        <div class="photo-label">VIBE_02</div>
    </div>
    <div class="photo-wrap">
        <img src="img\3.jpg">
        <div class="photo-label">VIBE_03</div>
    </div>
</div>

<div class="overlay-msg" id="msg">
    <div>
        <h2>HAPPY BIRTHDAY, V.</h2>
        <p style="font-size: 1.5rem; max-width: 800px;">
            17 років — це твоя суперсила. Світ стає яскравішим, коли ти посміхаєшся. 
            Будь сміливою, будь дикою, будь собою ❤️.
        </p>
        <button class="cta-trigger" style="border-color: #000; color: #000;" onclick="closeMessage()">CLOSE</button>
    </div>
</div>

<script>
    const follower = document.getElementById('cursor-follower');
    
    // Smooth Cursor
    document.addEventListener('mousemove', (e) => {
        gsap.to(follower, {
            x: e.clientX - 20,
            y: e.clientY - 20,
            duration: 0.3,
            ease: "power2.out"
        });
    });

    // Hover effect for cursor
    document.querySelectorAll('button, .photo-wrap').forEach(el => {
        el.addEventListener('mouseenter', () => {
            gsap.to(follower, { scale: 2, background: 'rgba(255, 0, 85, 0.3)', duration: 0.3 });
        });
        el.addEventListener('mouseleave', () => {
            gsap.to(follower, { scale: 1, background: 'transparent', duration: 0.3 });
        });
    });

    function openMessage() {
        gsap.to("#msg", {
            clipPath: "circle(150% at 50% 50%)",
            duration: 1.2,
            ease: "expo.inOut"
        });
    }

    function closeMessage() {
        gsap.to("#msg", {
            clipPath: "circle(0% at 50% 50%)",
            duration: 1,
            ease: "expo.inOut"
        });
    }

    // Parallax Background Text
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        document.querySelector('.bg-text').style.transform = `translate(-50%, -50%) translateX(${scrolled * 0.5}px)`;
    });
</script>

</body>
</html>
